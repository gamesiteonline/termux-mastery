<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <clipPath id="zsh-clip"><rect x="2" y="28" width="796" height="420" rx="0"/></clipPath>
  </defs>
  <rect x="0" y="0" width="800" height="450" rx="8" fill="#1e1e2e" stroke="#444" stroke-width="1"/>
  <rect x="0" y="0" width="800" height="28" rx="8" fill="#313244"/>
  <rect x="0" y="14" width="800" height="14" fill="#313244"/>
  <circle cx="16" cy="14" r="5" fill="#ff5f57"/>
  <circle cx="32" cy="14" r="5" fill="#fdbc40"/>
  <circle cx="48" cy="14" r="5" fill="#33c748"/>
  <text x="400" y="19" fill="#cdd6f4" font-size="11" font-family="monospace" text-anchor="middle">zsh — autocomplete</text>

  <g clip-path="url(#zsh-clip)">
    <!-- Existing prompt -->
    <rect x="8" y="36" width="320" height="22" rx="4" fill="#313244"/>
    <text x="16" y="51" fill="#89b4fa" font-size="13" font-family="monospace">  ~/dev/my-project</text>
    <text x="150" y="51" fill="#a6e3a1" font-size="13" font-family="monospace">main</text>

    <text x="8" y="82" fill="#cdd6f4" font-size="13" font-family="monospace">cd src/utils</text>
    <text x="8" y="104" fill="#6c7086" font-size="12" font-family="monospace">src/utils</text>

    <!-- Prompt -->
    <rect x="8" y="120" width="320" height="22" rx="4" fill="#313244"/>
    <text x="16" y="135" fill="#89b4fa" font-size="13" font-family="monospace">  ~/dev/my-project/src/utils</text>
    <text x="210" y="135" fill="#a6e3a1" font-size="13" font-family="monospace">main</text>

    <!-- Typing command with autocomplete menu -->
    <text x="8" y="164" fill="#f5c2e7" font-size="13" font-family="monospace">git checkout</text>
    <rect x="136" y="167" width="8" height="15" fill="#f5c2e7" opacity="0.7"/>

    <!-- Autocomplete dropdown menu -->
    <rect x="8" y="178" width="320" height="100" rx="4" fill="#2a2a3c" stroke="#585b70" stroke-width="1"/>
    <rect x="8" y="178" width="320" height="22" rx="4" fill="#45475a"/>
    <rect x="8" y="190" width="320" height="10" fill="#45475a"/>

    <text x="16" y="194" fill="#cdd6f4" font-size="12" font-family="monospace">Tags</text>

    <text x="16" y="214" fill="#a6e3a1" font-size="12" font-family="monospace">  v1.0.0</text>
    <text x="120" y="214" fill="#6c7086" font-size="11" font-family="monospace">Latest stable release</text>

    <text x="16" y="234" fill="#cdd6f4" font-size="12" font-family="monospace">  v2.0.0-rc1</text>
    <text x="140" y="234" fill="#6c7086" font-size="11" font-family="monospace">Release candidate</text>

    <text x="16" y="254" fill="#cdd6f4" font-size="12" font-family="monospace">  v1.1.0</text>
    <text x="120" y="254" fill="#6c7086" font-size="11" font-family="monospace">Bugfixes &amp; improvements</text>

    <text x="16" y="274" fill="#cdd6f4" font-size="12" font-family="monospace">  v1.0.1</text>
    <text x="120" y="274" fill="#6c7086" font-size="11" font-family="monospace">Security patch</text>

    <!-- Second command with branch completion -->
    <text x="8" y="310" fill="#cdd6f4" font-size="13" font-family="monospace">git branch</text>

    <rect x="8" y="330" width="320" height="22" rx="4" fill="#313244"/>
    <text x="16" y="345" fill="#89b4fa" font-size="13" font-family="monospace">  ~/dev/my-project/src/utils</text>
    <text x="210" y="345" fill="#a6e3a1" font-size="13" font-family="monospace">main</text>

    <text x="8" y="374" fill="#f5c2e7" font-size="13" font-family="monospace">git checkout</text>

    <!-- Another autocomplete showing branches -->
    <rect x="8" y="388" width="320" height="56" rx="4" fill="#2a2a3c" stroke="#585b70" stroke-width="1"/>
    <rect x="8" y="388" width="320" height="22" rx="4" fill="#45475a"/>
    <rect x="8" y="400" width="320" height="10" fill="#45475a"/>
    <text x="16" y="404" fill="#cdd6f4" font-size="12" font-family="monospace">Branches</text>

    <text x="16" y="424" fill="#a6e3a1" font-size="12" font-family="monospace">  main</text>
    <text x="16" y="442" fill="#cdd6f4" font-size="12" font-family="monospace">  feature/new-ui</text>

    <rect x="96" y="430" width="8" height="14" fill="#f5c2e7" opacity="0.7"/>
  </g>
</svg>
