<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <clipPath id="before-clip"><rect x="2" y="28" width="394" height="420" rx="0"/></clipPath>
    <clipPath id="after-clip"><rect x="400" y="28" width="398" height="420" rx="0"/></clipPath>
  </defs>

  <!-- Before: basic bash -->
  <rect x="0" y="0" width="398" height="450" rx="6" fill="#1e1e1e" stroke="#444" stroke-width="1"/>
  <rect x="0" y="0" width="398" height="28" rx="6" fill="#2e2e2e"/>
  <rect x="0" y="14" width="398" height="14" fill="#2e2e2e"/>
  <circle cx="14" cy="14" r="5" fill="#ff5f57"/>
  <circle cx="28" cy="14" r="5" fill="#fdbc40"/>
  <circle cx="42" cy="14" r="5" fill="#33c748"/>
  <text x="199" y="19" fill="#aaa" font-size="10" font-family="monospace" text-anchor="middle">Before: Default Bash</text>

  <g clip-path="url(#before-clip)">
    <text x="8" y="48" fill="#aaa" font-size="13" font-family="monospace">user@phone:~$</text>
    <text x="148" y="64" fill="#f5f5f5" font-size="13" font-family="monospace">ls</text>
    <text x="8" y="80" fill="#f5f5f5" font-size="13" font-family="monospace">Documents  Downloads  Music  Pictures</text>
    <text x="8" y="96" fill="#f5f5f5" font-size="13" font-family="monospace">Videos  storage</text>

    <text x="8" y="120" fill="#aaa" font-size="13" font-family="monospace">user@phone:~$</text>
    <text x="148" y="136" fill="#f5f5f5" font-size="13" font-family="monospace">cd Documents</text>

    <text x="8" y="160" fill="#aaa" font-size="13" font-family="monospace">user@phone:~/Documents$</text>
    <text x="200" y="176" fill="#f5f5f5" font-size="13" font-family="monospace">pwd</text>
    <text x="8" y="192" fill="#f5f5f5" font-size="13" font-family="monospace">/data/data/com.termux/files/home/Documents</text>

    <text x="8" y="216" fill="#aaa" font-size="13" font-family="monospace">user@phone:~/Documents$</text>
    <text x="200" y="232" fill="#f5f5f5" font-size="13" font-family="monospace">git status</text>
    <text x="8" y="248" fill="#f5f5f5" font-size="13" font-family="monospace">fatal: not a git repository</text>

    <text x="8" y="272" fill="#aaa" font-size="13" font-family="monospace">user@phone:~/Documents$</text>
    <text x="200" y="288" fill="#f5f5f5" font-size="13" font-family="monospace">node --version</text>
    <text x="8" y="304" fill="#f5f5f5" font-size="13" font-family="monospace">v18.16.0</text>

    <text x="8" y="328" fill="#aaa" font-size="13" font-family="monospace">user@phone:~/Documents$</text>
    <text x="8" y="344" fill="#f5f5f5" font-size="13" font-family="monospace">^C</text>

    <text x="8" y="368" fill="#aaa" font-size="13" font-family="monospace">user@phone:~/Documents$</text>
    <text x="8" y="384" fill="#f5f5f5" font-size="13" font-family="monospace">^C</text>

    <rect x="200" y="390" width="8" height="14" fill="#aaa" opacity="0.6"/>
  </g>

  <!-- After: custom zsh -->
  <rect x="400" y="0" width="400" height="450" rx="6" fill="#1e1e2e" stroke="#444" stroke-width="1"/>
  <rect x="400" y="0" width="400" height="28" rx="6" fill="#313244"/>
  <rect x="400" y="14" width="400" height="14" fill="#313244"/>
  <circle cx="414" cy="14" r="5" fill="#ff5f57"/>
  <circle cx="428" cy="14" r="5" fill="#fdbc40"/>
  <circle cx="442" cy="14" r="5" fill="#33c748"/>
  <text x="600" y="19" fill="#aaa" font-size="10" font-family="monospace" text-anchor="middle">After: Custom Zsh (Powerlevel10k)</text>

  <g clip-path="url(#after-clip)">
    <!-- Powerlevel10k prompt -->
    <rect x="8" y="36" width="280" height="22" rx="4" fill="#313244"/>
    <text x="16" y="51" fill="#89b4fa" font-size="13" font-family="monospace">  ~</text>
    <text x="32" y="51" fill="#6c7086" font-size="13" font-family="monospace"></text>

    <text x="8" y="76" fill="#89b4fa" font-size="13" font-family="monospace">  ~</text>
    <text x="24" y="76" fill="#6c7086" font-size="13" font-family="monospace"></text>
    <text x="32" y="76" fill="#f5c2e7" font-size="13" font-family="monospace">ls</text>
    <text x="8" y="96" fill="#89b4fa" font-size="13" font-family="monospace">  Documents</text>
    <text x="8" y="112" fill="#89b4fa" font-size="13" font-family="monospace">  Downloads</text>
    <text x="8" y="128" fill="#fab387" font-size="13" font-family="monospace">  Music</text>
    <text x="8" y="144" fill="#fab387" font-size="13" font-family="monospace">  Pictures</text>
    <text x="8" y="160" fill="#89b4fa" font-size="13" font-family="monospace">  Videos</text>
    <text x="8" y="176" fill="#a6e3a1" font-size="13" font-family="monospace">  storage</text>

    <rect x="8" y="196" width="380" height="22" rx="4" fill="#313244"/>
    <text x="16" y="211" fill="#89b4fa" font-size="13" font-family="monospace">  ~/Documents</text>
    <text x="88" y="211" fill="#6c7086" font-size="13" font-family="monospace"></text>

    <text x="8" y="236" fill="#89b4fa" font-size="13" font-family="monospace">  ~/Documents</text>
    <text x="88" y="236" fill="#6c7086" font-size="13" font-family="monospace"></text>
    <text x="96" y="236" fill="#f5c2e7" font-size="13" font-family="monospace">git init</text>
    <text x="8" y="256" fill="#a6e3a1" font-size="13" font-family="monospace">  Initialized empty Git repo</text>

    <rect x="8" y="276" width="380" height="22" rx="4" fill="#313244"/>
    <text x="16" y="291" fill="#89b4fa" font-size="13" font-family="monospace">  ~/Documents</text>
    <text x="88" y="291" fill="#6c7086" font-size="13" font-family="monospace"></text>
    <text x="96" y="291" fill="#a6e3a1" font-size="13" font-family="monospace">   main</text>
    <text x="140" y="291" fill="#6c7086" font-size="13" font-family="monospace"></text>

    <text x="8" y="316" fill="#89b4fa" font-size="13" font-family="monospace">  ~/Documents</text>
    <text x="88" y="316" fill="#6c7086" font-size="13" font-family="monospace"></text>
    <text x="96" y="316" fill="#a6e3a1" font-size="13" font-family="monospace">   main</text>
    <text x="140" y="316" fill="#6c7086" font-size="13" font-family="monospace"></text>
    <text x="148" y="316" fill="#f5c2e7" font-size="13" font-family="monospace">node --version</text>
    <text x="8" y="336" fill="#f5c2e7" font-size="13" font-family="monospace">  v18.16.0</text>

    <rect x="8" y="356" width="380" height="22" rx="4" fill="#313244"/>
    <text x="16" y="371" fill="#89b4fa" font-size="13" font-family="monospace">  ~/Documents</text>
    <text x="88" y="371" fill="#6c7086" font-size="13" font-family="monospace"></text>
    <text x="96" y="371" fill="#a6e3a1" font-size="13" font-family="monospace">   main</text>
    <text x="140" y="371" fill="#6c7086" font-size="13" font-family="monospace"></text>

    <!-- Cursor -->
    <rect x="148" y="378" width="8" height="14" fill="#89b4fa" opacity="0.6"/>
  </g>

  <!-- Divider -->
  <line x1="398" y1="28" x2="398" y2="450" stroke="#585b70" stroke-width="2" stroke-dasharray="4,4"/>
</svg>
