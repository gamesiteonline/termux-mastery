<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <clipPath id="cron-clip"><rect x="2" y="28" width="796" height="420" rx="0"/></clipPath>
  </defs>
  <rect x="0" y="0" width="800" height="450" rx="8" fill="#1e1e2e" stroke="#444" stroke-width="1"/>
  <rect x="0" y="0" width="800" height="28" rx="8" fill="#2e2e3e"/>
  <rect x="0" y="14" width="800" height="14" fill="#2e2e3e"/>
  <circle cx="16" cy="14" r="5" fill="#ff5f57"/>
  <circle cx="32" cy="14" r="5" fill="#fdbc40"/>
  <circle cx="48" cy="14" r="5" fill="#33c748"/>
  <text x="400" y="19" fill="#aaa" font-size="11" font-family="monospace" text-anchor="middle">crontab -l</text>

  <g clip-path="url(#cron-clip)">
    <!-- Prompt -->
    <rect x="8" y="36" width="280" height="22" rx="4" fill="#313244"/>
    <text x="16" y="51" fill="#89b4fa" font-size="13" font-family="monospace">  ~</text>
    <text x="32" y="51" fill="#6c7086" font-size="13" font-family="monospace"></text>
    <text x="40" y="51" fill="#a6e3a1" font-size="13" font-family="monospace">   main</text>
    <text x="84" y="51" fill="#6c7086" font-size="13" font-family="monospace"></text>

    <text x="8" y="80" fill="#cdd6f4" font-size="13" font-family="monospace">crontab -l</text>
    <text x="8" y="104" fill="#6c7086" font-size="12" font-family="monospace"># Edit this file to introduce tasks to be run by cron.</text>
    <text x="8" y="120" fill="#6c7086" font-size="12" font-family="monospace"># Each task has to be defined by a single command line.</text>
    <text x="8" y="136" fill="#6c7086" font-size="12" font-family="monospace"># m h  dom mon dow   command</text>

    <!-- Crontab entries -->
    <text x="8" y="164" fill="#f38ba8" font-size="13" font-family="monospace"># Daily backup at 2 AM</text>
    <text x="8" y="184" fill="#a6e3a1" font-size="13" font-family="monospace">0 2 * * *</text>
    <text x="80" y="184" fill="#89b4fa" font-size="13" font-family="monospace">~/scripts/backup.sh</text>

    <text x="8" y="208" fill="#f38ba8" font-size="13" font-family="monospace"># System update every Monday at 3 AM</text>
    <text x="8" y="228" fill="#a6e3a1" font-size="13" font-family="monospace">0 3 * * 1</text>
    <text x="80" y="228" fill="#89b4fa" font-size="13" font-family="monospace">pkg update &amp;&amp; pkg upgrade -y</text>

    <text x="8" y="252" fill="#f38ba8" font-size="13" font-family="monospace"># Clear temp files daily at midnight</text>
    <text x="8" y="272" fill="#a6e3a1" font-size="13" font-family="monospace">0 0 * * *</text>
    <text x="80" y="272" fill="#89b4fa" font-size="13" font-family="monospace">rm -rf ~/.cache/*</text>

    <text x="8" y="296" fill="#f38ba8" font-size="13" font-family="monospace"># Git auto-commit every hour</text>
    <text x="8" y="316" fill="#a6e3a1" font-size="13" font-family="monospace">0 * * * *</text>
    <text x="80" y="316" fill="#89b4fa" font-size="13" font-family="monospace">cd ~/notes &amp;&amp; git add -A &amp;&amp; git commit -m "auto"</text>

    <text x="8" y="340" fill="#f38ba8" font-size="13" font-family="monospace"># Send weather report at 7 AM</text>
    <text x="8" y="360" fill="#a6e3a1" font-size="13" font-family="monospace">0 7 * * *</text>
    <text x="80" y="360" fill="#89b4fa" font-size="13" font-family="monospace">curl wttr.in?format=3 | termux-notification</text>

    <text x="8" y="384" fill="#f38ba8" font-size="13" font-family="monospace"># Battery check every 30 minutes</text>
    <text x="8" y="404" fill="#a6e3a1" font-size="13" font-family="monospace">*/30 * * * *</text>
    <text x="80" y="404" fill="#89b4fa" font-size="13" font-family="monospace">termux-battery-status | grep percentage</text>

    <text x="8" y="428" fill="#a6e3a1" font-size="13" font-family="monospace">@reboot</text>
    <text x="80" y="428" fill="#89b4fa" font-size="13" font-family="monospace">termux-wake-lock &amp;&amp; ~/scripts/start-server.sh</text>
  </g>
</svg>
