  <text x="188" y="160" fill="#abb2bf" font-size="11" font-family="monospace">=&gt; setCount(c </text>
  <text x="260" y="160" fill="#abb2bf" font-size="11" font-family="monospace">=&gt; c+1)}&gt;</text>
  <text x="84" y="176" fill="#abb2bf" font-size="11" font-family="monospace">Increment</text>
  <text x="84" y="192" fill="#abb2bf" font-size="11" font-family="monospace">&lt;/button&gt;</text>
  <text x="72" y="208" fill="#abb2bf" font-size="11" font-family="monospace">&lt;/div&gt;</text>
